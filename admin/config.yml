backend:
  name: git-gateway
  branch: main

media_folder: "static/uploads"
public_folder: "/static/uploads"

locale: fr

collections:
  # ─── RÉGLAGES GÉNÉRAUX ────────────────────────────────────────
  - name: "site"
    label: "⚙️ Réglages du site"
    files:
      - name: "general"
        label: "Informations générales"
        file: "content/general.json"
        fields:
          - { label: "Titre du site", name: "site_title", widget: "string" }
          - { label: "Email de contact", name: "email", widget: "string" }
          - { label: "Téléphone", name: "phone", widget: "string" }
          - { label: "Zone d'intervention", name: "zone", widget: "string" }
          - { label: "Lien YouTube", name: "youtube", widget: "string" }
          - { label: "Lien Instagram", name: "instagram", widget: "string" }

  # ─── HERO ─────────────────────────────────────────────────────
  - name: "hero"
    label: "🏠 Page d'accueil (Hero)"
    files:
      - name: "hero"
        label: "Textes & image principale"
        file: "content/hero.json"
        fields:
          - { label: "Petite accroche (haut)", name: "eyebrow", widget: "string" }
          - { label: "Titre ligne 1", name: "title1", widget: "string" }
          - { label: "Titre ligne 2 (en rouge)", name: "title2", widget: "string" }
          - { label: "Titre ligne 3", name: "title3", widget: "string" }
          - { label: "Sous-titre", name: "subtitle", widget: "text" }
          - { label: "Photo principale", name: "hero_image", widget: "image", required: false }
          - { label: "Texte bouton", name: "cta_text", widget: "string" }

  # ─── STATS ────────────────────────────────────────────────────
  - name: "stats"
    label: "📊 Chiffres clés"
    files:
      - name: "stats"
        label: "Les 4 statistiques"
        file: "content/stats.json"
        fields:
          - label: "Stat 1"
            name: "stat1"
            widget: "object"
            fields:
              - { label: "Nombre", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Stat 2"
            name: "stat2"
            widget: "object"
            fields:
              - { label: "Nombre", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Stat 3"
            name: "stat3"
            widget: "object"
            fields:
              - { label: "Nombre", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Stat 4"
            name: "stat4"
            widget: "object"
            fields:
              - { label: "Nombre", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

  # ─── SERVICES ─────────────────────────────────────────────────
  - name: "services"
    label: "🎯 Services"
    files:
      - name: "services"
        label: "Les 3 services"
        file: "content/services.json"
        fields:
          - label: "Service 1"
            name: "service1"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Points (4 max)"
                name: "items"
                widget: "list"
                field: { label: "Point", name: "item", widget: "string" }
          - label: "Service 2"
            name: "service2"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Points"
                name: "items"
                widget: "list"
                field: { label: "Point", name: "item", widget: "string" }
          - label: "Service 3"
            name: "service3"
            widget: "object"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Points"
                name: "items"
                widget: "list"
                field: { label: "Point", name: "item", widget: "string" }

  # ─── PORTFOLIO ────────────────────────────────────────────────
  - name: "portfolio"
    label: "📸 Portfolio"
    label_singular: "Photo"
    folder: "content/portfolio"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Nom (identifiant, sans espaces)", name: "name", widget: "string" }
      - { label: "Catégorie", name: "category", widget: "select", options: ["Corporate", "Événements", "Produits", "Mariage"] }
      - { label: "Titre / Légende", name: "title", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Ordre d'affichage", name: "order", widget: "number", default: 1 }

  # ─── TEMOIGNAGES ──────────────────────────────────────────────
  - name: "testimonials"
    label: "💬 Témoignages"
    label_singular: "Témoignage"
    folder: "content/testimonials"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Nom (identifiant, ex: jean-dupont)", name: "name", widget: "string" }
      - { label: "Témoignage", name: "quote", widget: "text" }
      - { label: "Prénom & Nom affiché", name: "display_name", widget: "string" }
      - { label: "Poste & Entreprise", name: "role", widget: "string" }
      - { label: "Initiales (ex: JD)", name: "initials", widget: "string" }

  # ─── A PROPOS ─────────────────────────────────────────────────
  - name: "about"
    label: "👤 À propos"
    files:
      - name: "about"
        label: "Section À propos"
        file: "content/about.json"
        fields:
          - { label: "Photo", name: "photo", widget: "image", required: false }
          - { label: "Paragraphe 1", name: "p1", widget: "text" }
          - { label: "Paragraphe 2", name: "p2", widget: "text" }
          - { label: "Paragraphe 3", name: "p3", widget: "text" }
